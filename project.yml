name: StockAlerts
options:
  bundleIdPrefix: com.pintailconsultingllc
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  StockAlerts:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: StockAlerts
    info:
      path: StockAlerts/Info.plist
      properties:
        LSUIElement: YES
        NSUserNotificationAlertStyle: alert
        CFBundleDisplayName: Stock Alerts
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 Christopher Bartling. MIT License."
    entitlements:
      path: StockAlerts/StockAlerts.entitlements
      properties:
        com.apple.security.app-sandbox: YES
        com.apple.security.network.client: YES
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pintailconsultingllc.StockAlerts
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: StockAlerts
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES

  StockAlertsTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: StockAlertsTests
    dependencies:
      - target: StockAlerts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pintailconsultingllc.StockAlertsTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StockAlerts.app/Contents/MacOS/StockAlerts"

schemes:
  StockAlerts:
    build:
      targets:
        StockAlerts: all
        StockAlertsTests: [test]
    test:
      targets:
        - StockAlertsTests
      gatherCoverageData: true
    run:
      config: Debug
    archive:
      config: Release
